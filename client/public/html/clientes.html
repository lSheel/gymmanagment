<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Clientes - Gym System</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/clientes.css" />
    <script src="../js/authMiddleware.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>Gestión de Clientes</h1>
    </header>

    <nav>
      <a href="gestionReportes.html">Gestion de reportes</a>
      <a href="RNUsuarios.html">Registro de Usuario Nuevo</a>
      <a href="login_usuario.html">Acceso Usuario Registrado</a>
      <a href="clientes.html">Gestión de Clientes</a>
      <a href="membresias.html">Gestión de Membresías</a>
      <a href="pagos.html">Gestión de Pagos</a>
      <a href="reportes.html">Reportes</a>
      <button id="logoutBtn">Cerrar Sesión</button>
    </nav>

    <div class="container">
      <!-- Ver información de clientes -->
      <section class="section">
        <h2>Consultar información de clientes</h2>
        <button id="verClientesBtn" class="btn-primary">
          Ver información de clientes
        </button>
        <div id="clientesContainer" class="result-container"></div>
      </section>

      <!-- Eliminar usuario -->
      <section class="section">
        <h2>Eliminar usuario</h2>
        <form id="eliminarForm" class="client-form">
          <div class="form-group">
            <label for="id_cliente">ID del cliente:</label>
            <input
              type="text"
              id="id_cliente"
              name="id_cliente"
              placeholder="Escribe el ID del cliente"
              required
            />
          </div>
          <button type="submit" class="btn-danger">Eliminar usuario</button>
        </form>
        <div id="mensajeEliminacion" class="message-container"></div>
      </section>

      <a href="menu.html" class="btn-back">Volver al Menú Principal</a>
    </div>
    <script>
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("jwtToken");
        localStorage.removeItem("userData");
        window.location.href = "index.html";
      });
    </script>

    <script src="../js/clientesAPI.js"></script>
  </body>
</html>
