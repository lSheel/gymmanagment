<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Nuevo Cliente</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/authMiddleware.js" defer></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="../js/registrarUsuarioAPI.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Registro de Nuevo Cliente</h1>
      <nav>
        <a href="gestionReportes.html">Gestion de reportes</a>
        <a href="RNUsuarios.html">Registro de Usuario Nuevo</a>
        <a href="login_usuario.html">Acceso Usuario Registrado</a>
        <a href="clientes.html">Gestión de Clientes</a>
        <a href="membresias.html">Gestión de Membresías</a>
        <a href="pagos.html">Gestión de Pagos</a>
        <a href="reportes.html">Reportes</a>
        <button id="logoutBtn">Cerrar Sesión</button>
      </nav>
    </header>

    <div class="container">
      <section class="section">
        <h2>Registra un nuevo cliente</h2>
        <form id="registroClienteForm">
          <label for="nombre_completo">Nombre Completo:</label>
          <input
            type="text"
            id="nombre_completo"
            name="nombre_completo"
            placeholder="Escribe el nombre completo"
            required
          />

          <label for="telefono">Teléfono:</label>
          <input
            type="tel"
            id="telefono"
            name="telefono"
            placeholder="Escribe el número de teléfono"
          />

          <label for="direccion">Dirección:</label>
          <input
            type="text"
            id="direccion"
            name="direccion"
            placeholder="Escribe la dirección"
          />

          <label for="genero">Género:</label>
          <select id="genero" name="genero" required>
            <option value="">Seleccione...</option>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
            <option value="Otro">Otro</option>
          </select>

          <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
          <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" />

          <label for="correo">Correo Electrónico:</label>
          <input
            type="email"
            id="correo"
            name="correo"
            placeholder="Escribe el correo electrónico"
          />

          <button type="submit">Registrar Cliente</button>
        </form>
        <a href="menu.html">Volver al Menú Principal</a>
      </section>
      <script>
        // Logout functionality
        document.getElementById("logoutBtn").addEventListener("click", () => {
          localStorage.removeItem("jwtToken");
          localStorage.removeItem("userData");
          window.location.href = "index.html";
        });
      </script>
    </div>
  </body>
</html>
