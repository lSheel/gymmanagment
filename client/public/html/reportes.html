<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Envío de Reportes</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="../js/authMiddleware.js" defer></script>
    <script src="../js/generarReporteAPI.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Envío de Reportes</h1>
      <nav>
        <a href="gestionReportes.html">Gestion de reportes</a>
        <a href="RNUsuarios.html">Registro de Usuario Nuevo</a>
        <a href="login_usuario.html">Acceso Usuario Registrado</a>
        <a href="clientes.html">Gestión de Clientes</a>
        <a href="membresias.html">Gestión de Membresías</a>
        <a href="pagos.html">Gestión de Pagos</a>
        <a href="reportes.html">Reportes</a>
        <button id="logoutBtn">Cerrar Sesión</button>
      </nav>
    </header>

    <div class="container">
      <section class="section">
        <h2>¡Queremos conocer tu reporte!</h2>
        <form id="reporteForm">
          <label for="nombre">Tu nombre:</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Escribe tu nombre..."
            required
          />

          <label for="reporte">Escribe tu reporte:</label>
          <textarea
            id="reporte"
            name="reporte"
            maxlength="500"
            placeholder="Escribe aquí tu reporte (máx. 500 caracteres)..."
            required
          ></textarea>
          <p class="note">* Máximo 500 caracteres.</p>

          <button type="submit">Enviar Reporte</button>
        </form>
        <a href="menu.html">Volver al Menú Principal</a>
      </section>
      <script>
        // Logout functionality
        document.getElementById("logoutBtn").addEventListener("click", () => {
          localStorage.removeItem("jwtToken");
          localStorage.removeItem("userData");
          window.location.href = "index.html";
        });
      </script>
    </div>
  </body>
</html>
